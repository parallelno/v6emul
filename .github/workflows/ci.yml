name: CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          VERSION="$(date -u +'%Y.%m.%d')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

  build-test:
    name: Build and Test (${{ matrix.platform }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-x86_64
    env:
      V6EMUL_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci --config Release

      - name: Test
        run: ctest --test-dir build/ci --build-config Release --output-on-failure --timeout 120

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: v6emul-${{ needs.version.outputs.version }}-${{ matrix.platform }}
          path: build/ci/app/Release/v6emul.exe
          if-no-files-found: error

      - name: Upload binary (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: v6emul-${{ needs.version.outputs.version }}-${{ matrix.platform }}
          path: build/ci/app/v6emul
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [version, build-test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        shell: bash
        run: |
          set -e
          mkdir -p dist
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == *windows* ]]; then
              (cd "$dir" && zip -r "../../dist/${name}.zip" .)
            else
              chmod +x "${dir}"v6emul 2>/dev/null || true
              tar -czf "../dist/${name}.tar.gz" -C "$dir" .
            fi
          done
          ls -la ../dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
